  <rect x="136" y="38" width="9" height="22" rx="4.5" fill="#a78bfa"/>
  <rect x="176" y="38" width="9" height="22" rx="4.5" fill="#a78bfa"/>
  <!-- Day dots row 1 -->
  <circle cx="94" cy="116" r="5" fill="#c4b5fd"/>
  <circle cx="118" cy="116" r="5" fill="#c4b5fd"/>
  <circle cx="142" cy="116" r="5" fill="#c4b5fd"/>
  <circle cx="166" cy="116" r="5" fill="#c4b5fd"/>
  <circle cx="190" cy="116" r="5" fill="#c4b5fd"/>
  <!-- Day dots row 2 -->
