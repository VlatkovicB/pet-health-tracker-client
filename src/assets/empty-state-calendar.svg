  <ellipse cx="153" cy="139" rx="5.5" ry="6.5" fill="#6c63ff" opacity="0.75"/>
  <ellipse cx="162" cy="134" rx="5.5" ry="6.5" fill="#6c63ff" opacity="0.75"/>
  <ellipse cx="172" cy="134" rx="5.5" ry="6.5" fill="#6c63ff" opacity="0.75"/>
  <ellipse cx="181" cy="139" rx="5.5" ry="6.5" fill="#6c63ff" opacity="0.75"/>
  <circle cx="190" cy="140" r="5" fill="#c4b5fd"/>
